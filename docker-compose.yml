services:
  backend:
    image: healthdiary-backend
    pull_policy: never
    container_name: healthdiary-backend
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
 
    volumes:
      - ./backend/src:/app/src
      - ./backend/db:/app/db
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
  
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=healthdiary
    depends_on:
      - mongo
    

  frontend:
    image: healthdiary-frontend
    pull_policy: never
    container_name: healthdiary-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 5173:5173
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents local node_modules from overriding container ones
    environment:
      - VITE_API_URL=http://backend:5000 # Use backend service name
    depends_on:
      - backend

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    ports:
      - 8081:8081
    container_name: healthdiary-mongo-express
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
      ME_CONFIG_BASICAUTH_USERNAME: root
      ME_CONFIG_BASICAUTH_PASSWORD: password
volumes:
  mongo_data: